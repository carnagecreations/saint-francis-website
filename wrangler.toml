name = "sfr-rescue"
pages_build_output_dir = "."
# Without a modern compatibility date, formData() parses uploaded files as
# strings instead of File objects and /api/admin/uploads rejects everything.
compatibility_date = "2024-10-01"

# NEON_DATABASE_URL and ADMIN_TOKEN are encrypted Pages secrets
# (set via `wrangler pages secret put <NAME> --project-name=sfr-rescue`).
# Never put credentials in this file — it must stay safe to publish.
[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "sfr-rescue-media"
